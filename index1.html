<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    
    background: linear-gradient(135deg, #f5f7ff 0%, #f3fbf7 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}


.container {
    background: #ffffff;
    padding: 35px 30px;
    border-radius: 24px;
    width: 100%;
    max-width: 460px;
    
    box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.02),
        0 10px 15px -3px rgba(148, 163, 184, 0.08),
        0 20px 25px -5px rgba(148, 163, 184, 0.04);
    border: 1px solid #eef2f6;
}

h2 {
    color: #100881de;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 26px;
    text-align: center;
    letter-spacing: -0.5px;
}


.input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
}

#inputValue {
    flex: 1;
    background: #f8fafc;
    border: 2px solid #e2e8f0; 
    padding: 14px 18px;
    border-radius: 14px;
    color: #1e293b;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: all 0.25s ease;
}

#inputValue::placeholder {
    color: #94a3b8;
}

#inputValue:focus {
    background: #ffffff;
    border-color: #4f46e5; 
    box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
}


button {
    cursor: pointer;
    border: none;
    font-size: 14px;
    font-weight: 600;
    border-radius: 14px;
    padding: 0 24px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}


#add {
    background: #4f46e5; 
    color: #ffffff;
    box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
}

#add:hover {
    background: #4338ca;
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(79, 70, 229, 0.3);
}


#update {
    background: #0d9488; 
    color: #ffffff;
    display: none; 
    box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
}

#update:hover {
    background: #0f766e;
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(13, 148, 136, 0.3);
}

#listTask {
    list-style: none;
    max-height: 380px;
    overflow-y: auto;
    padding-right: 4px;
}

#listTask::-webkit-scrollbar {
    width: 6px;
}

#listTask::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
}


#listTask li {
    background: #f8fafc; 
    border: 1px solid #e2e8f0;
    border-left: 4px solid #4f46e5;
    padding: 15px 16px;
    border-radius: 4px 14px 14px 4px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    transition: all 0.2s ease;
}


#listTask li:hover {
    background: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(148, 163, 184, 0.1);
    border-color: #cbd5e1;
    border-left-color: #4f46e5;
}

.task-text {
    color: #334155;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-all;
    flex: 1;
    font-weight: 500;
}

.action-btns {
    display: flex;
    gap: 8px;
}


.edit-btn {
    background: #e0e7ff; 
    color: #4f46e5;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
}

.edit-btn:hover {
    background: #c7d2fe;
    color: #3730a3;
}

.delete-btn {
    background: #fee2e2;
    color: #ef4444;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
}

.delete-btn:hover {
    background: #fca5a5;
    color: #991b1b;
}
</style>
</head>

<body>

    <div class="container">
        <h2>Task Manager</h2>

        <div class="input-group">
            <input type="text" placeholder="What needs to be done?" id="inputValue">
            <button id="add" onclick="addTaskHandler()">Add</button>
            <button id="update">Update</button>
        </div>

        <ul id="listTask">

        </ul>
    </div>
    <script>
        var getTodovalue = JSON.parse(localStorage.getItem("usertask")) || [];

    function addTaskHandler() {
        let inputValue = document.getElementById("inputValue");
        if (inputValue.value == "") { 
            alert("Please enter a task");
            return;
        }

        var taskObj = {
            id: new Date().getTime(),
            task: inputValue.value
        };

        getTodovalue.push(taskObj);
        localStorage.setItem("usertask", JSON.stringify(getTodovalue));
        getTask();
        inputValue.value = ""; 
    }

    function getTask() {
        var listTask = document.getElementById("listTask");
        listTask.innerHTML = "";

        
        for (var i = 0; i < getTodovalue.length; i++) {
        listTask.innerHTML += `<li>${getTodovalue[i].task} 
        <button class="edit-btn" onclick="EditTask(${getTodovalue[i].id})">Edit</button> </li> 
        <button  class = "delete-btn" onclick="deleteTask(${getTodovalue[i].id})">Delete</button> `
    }
    }

    function deleteTask(id){
        getTodovalue = getTodovalue.filter(item => item.id !== id);
        localStorage.setItem("usertask", JSON.stringify(getTodovalue));
        getTask();
    }

    function EditTask(id){
        var updateBtn = document.getElementById("update");
        var addBtn = document.getElementById("add");
        var inputField = document.getElementById("inputValue");
        
        updateBtn.style.display = "block";
        addBtn.style.display = "none";
        
        for(var i=0; i<getTodovalue.length; i++){
            if(getTodovalue[i].id == id){
                inputField.value = getTodovalue[i].task;
            }
        }

        updateBtn.onclick = function(){
            for(var i=0; i<getTodovalue.length; i++){
                if(getTodovalue[i].id == id){
                    getTodovalue[i].task = inputField.value;
                    inputField.value = "";
                }
            }
            localStorage.setItem("usertask", JSON.stringify(getTodovalue));
            getTask();
            updateBtn.style.display = "none";
            addBtn.style.display = "block";
        }
    }

    getTask();
    </script>
</body>

</html>
